<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes — Yakú</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',Arial,sans-serif;background:#f1f5f9;min-height:100vh;color:#111827;visibility:hidden;}
body.ready{visibility:visible;}
.topbar{background:#1a1a2e;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logos{display:flex;align-items:center;gap:12px;}
.topbar-logos img.yaku{height:36px;}
.topbar-logos .fuk-wrap{background:rgba(255,255,255,0.1);border-radius:4px;padding:4px 8px;display:flex;align-items:center;}
.topbar-logos img.fuk{height:26px;}
.topbar-title{color:#fff;font-size:15px;font-weight:600;letter-spacing:0.3px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.topbar-right span{color:#9ca3af;font-size:12px;}
.btn-logout{background:transparent;border:1px solid #4b5563;color:#d1d5db;padding:6px 14px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.15s;}
.btn-logout:hover{border-color:#9ca3af;color:#fff;}
.contenido{padding:28px 32px;max-width:1200px;margin:0 auto;}
.stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.stat-card{background:#fff;border-radius:8px;padding:16px 22px;flex:1;min-width:140px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.stat-card .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
.stat-card .value{font-size:26px;font-weight:700;color:#1a1a2e;margin-top:4px;}
.stat-card .sub{font-size:11px;color:#9ca3af;margin-top:2px;}
.filtros{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.filtros input{padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:13px;outline:none;transition:border-color 0.15s;flex:1;min-width:180px;}
.filtros input:focus{border-color:#1a1a2e;}
.filtros select{padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:6px;font-family:inherit;font-size:13px;outline:none;}
.btn-refresh{padding:8px 16px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-refresh:hover{background:#2a2a45;}
.tabla-wrap{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.07);overflow:hidden;}
.tabla-header{padding:16px 20px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;}
.tabla-header h3{font-size:14px;font-weight:600;color:#374151;}
.tabla-header span{font-size:12px;color:#9ca3af;}
table{width:100%;border-collapse:collapse;}
thead th{background:#f9fafb;padding:10px 16px;text-align:left;font-size:11.5px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid #e5e7eb;}
tbody tr{border-bottom:1px solid #f3f4f6;transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f9fafb;}
tbody td{padding:12px 16px;font-size:13px;color:#374151;vertical-align:middle;}
.badge-origen{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:0.3px;}
.badge-importacion{background:#f3f4f6;color:#6b7280;}
.badge-orden{background:#dcfce7;color:#16a34a;}
.btn-ver{padding:5px 12px;background:#1a1a2e;color:#fff;border:none;border-radius:5px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.btn-ver:hover{background:#2a2a45;}
.tabs{display:flex;gap:0;margin-bottom:20px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.tab-btn{flex:1;padding:12px 20px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab-btn.active{color:#1a1a2e;border-bottom-color:#1a1a2e;background:#f9fafb;}
.tab-btn:hover:not(.active){background:#f3f4f6;}
.tab-count{font-size:11px;font-weight:400;color:#9ca3af;margin-left:4px;}
.equipo-chip{display:inline-block;background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;margin:1px;}
.equipo-chip.inactive{background:#f3f4f6;color:#9ca3af;}
.badge-inactivo{background:#fee2e2;color:#dc2626;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px;}
.loading{text-align:center;padding:48px;color:#9ca3af;font-size:14px;}
.empty-msg{text-align:center;padding:48px;color:#9ca3af;font-size:14px;}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid #f3f4f6;font-size:13px;color:#6b7280;}
.pag-btns{display:flex;gap:8px;}
.pag-btn{padding:6px 14px;border:1.5px solid #e5e7eb;background:#fff;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;}
.pag-btn:hover:not(:disabled){border-color:#1a1a2e;color:#1a1a2e;}
.pag-btn:disabled{opacity:0.4;cursor:not-allowed;}
/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;width:560px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-header{padding:18px 22px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#9ca3af;line-height:1;}
.modal-close:hover{color:#374151;}
.modal-body{padding:20px 22px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.detail-item label{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;display:block;margin-bottom:3px;}
.detail-item span{font-size:13px;color:#111827;}
.detail-full{grid-column:1/-1;}
.modal-footer{padding:16px 22px;border-top:1px solid #e5e7eb;display:flex;gap:10px;justify-content:flex-end;}
.btn-modal-close{padding:9px 20px;background:#f3f4f6;color:#374151;border:none;border-radius:7px;font-family:inherit;font-size:13px;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logos">
    <img class="yaku" src="https://yakuagua.com.ar/wp-content/uploads/2024/04/logo.png" alt="Yakú">
    <div class="fuk-wrap"><img class="fuk" src="https://yakuagua.com.ar/wp-content/uploads/2024/04/logo-fukari.png" alt="Fukari"></div>
  </div>
  <span class="topbar-title">Panel de Clientes</span>
  <div class="topbar-right">
    <span id="topbar-fecha"></span>
    <a href="/hub.html" class="btn-logout" style="text-decoration:none;">&#8592; Inicio</a>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<div class="contenido">
  <div class="stats-row">
    <div class="stat-card"><div class="label">Total clientes</div><div class="value" id="stat-total">—</div><div class="sub">en la base</div></div>
    <div class="stat-card"><div class="label">Con CUIT</div><div class="value" id="stat-cuit">—</div><div class="sub">identificados</div></div>
    <div class="stat-card"><div class="label">Solo DNI</div><div class="value" id="stat-dni">—</div><div class="sub">sin CUIT completo</div></div>
    <div class="stat-card"><div class="label">Inactivos</div><div class="value" id="stat-ordenes">—</div><div class="sub">dados de baja</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-activos" onclick="cambiarTab('activos')">Activos <span class="tab-count" id="count-activos">—</span></button>
    <button class="tab-btn" id="tab-inactivos" onclick="cambiarTab('inactivos')">Inactivos <span class="tab-count" id="count-inactivos">—</span></button>
    <button class="tab-btn" id="tab-todos" onclick="cambiarTab('todos')">Todos <span class="tab-count" id="count-todos">—</span></button>
  </div>

  <div class="filtros">
    <input type="text" id="filtro-buscar" placeholder="Buscar por razón social, CUIT o DNI..." oninput="filtrar()">
    <select id="filtro-origen" onchange="filtrar()">
      <option value="">Todos los orígenes</option>
      <option value="importacion">Importación</option>
      <option value="orden_instalacion">Orden de instalación</option>
    </select>
    <button class="btn-refresh" onclick="cargarClientes()">&#8635; Actualizar</button>
  </div>

  <div class="tabla-wrap">
    <div class="tabla-header">
      <h3>Clientes</h3>
      <span id="contador-visible">—</span>
    </div>
    <div id="tabla-body"><div class="loading">Cargando clientes...</div></div>
    <div class="pagination" id="pagination" style="display:none;">
      <span id="pag-info"></span>
      <div class="pag-btns">
        <button class="pag-btn" id="btn-prev" onclick="cambiarPagina(-1)" disabled>&#8592; Anterior</button>
        <button class="pag-btn" id="btn-next" onclick="cambiarPagina(1)">Siguiente &#8594;</button>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">Detalle de Cliente</h3>
      <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">&#215;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">Cerrar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const API_URL = 'https://fukari-backend-production.up.railway.app';
const SUPABASE_URL = 'https://bqjbblgbwgwqkziqzdyy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxamJibGdid2d3cWt6aXF6ZHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg4MTAsImV4cCI6MjA4ODIwNDgxMH0.DLXFYR4EgaejMbk3wBlU9SSVCi17YJ2aPiJc2h4y5mE';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const POR_PAGINA = 25;
var todosLosClientes = [];
var tabActual = 'activos';
var clientesFiltrados = [];
var paginaActual = 1;

sb.auth.getSession().then(function(r) {
  if (!r.data.session) { window.location.href = '/index.html'; return; }
  document.body.classList.add('ready');
  iniciarPanel();
});

function logout() { sb.auth.signOut().then(function() { window.location.href = '/index.html'; }); }

function iniciarPanel() {
  var d = new Date();
  document.getElementById('topbar-fecha').textContent = d.toLocaleDateString('es-AR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  cargarClientes();
}

async function cargarClientes() {
  document.getElementById('tabla-body').innerHTML = '<div class="loading">Cargando...</div>';
  try {
    var res = await fetch(API_URL + '/api/clientes');
    if (!res.ok) throw new Error('Error ' + res.status);
    todosLosClientes = await res.json();
    try {
      var resBajas = await fetch(API_URL + '/api/bajas?limit=500');
      if (resBajas.ok) {
        var bajasResp = await resBajas.json();
        var bajasData = bajasResp.data || bajasResp || [];
        window._bajasMap = {};
        window._bajasList = bajasData;
        bajasData.forEach(function(b) { if (b.cuit) window._bajasMap[b.cuit] = b; });
      }
    } catch(e) { console.log('Bajas error:', e); }
    try {
      var resOrdenes = await fetch(API_URL + '/api/ordenes');
      if (resOrdenes.ok) {
        window._ordenesList = await resOrdenes.json();
      }
    } catch(e) { console.log('Ordenes error:', e); }
    calcularStats();
    filtrar();
  } catch(err) {
    document.getElementById('tabla-body').innerHTML = '<div class="loading" style="color:#dc2626;">Error al cargar: ' + err.message + '</div>';
  }
}

function calcularStats() {
  var activos = todosLosClientes.filter(function(c) { return c.activo !== false; });
  var inactivos = todosLosClientes.filter(function(c) { return c.activo === false; });
  var conCuit = todosLosClientes.filter(function(c) { return c.cuit && c.cuit.length > 0; }).length;
  var conDni = todosLosClientes.filter(function(c) { return c.dni && c.dni.length > 0 && (!c.cuit || c.cuit.length === 0); }).length;
  document.getElementById('stat-total').textContent = activos.length;
  document.getElementById('stat-cuit').textContent = conCuit;
  document.getElementById('stat-dni').textContent = conDni;
  document.getElementById('stat-ordenes').textContent = inactivos.length;
  document.getElementById('count-activos').textContent = activos.length;
  document.getElementById('count-inactivos').textContent = inactivos.length;
  document.getElementById('count-todos').textContent = todosLosClientes.length;
}

function normStr(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

function filtrar() {
  var q = normStr(document.getElementById('filtro-buscar').value);
  var origen = document.getElementById('filtro-origen').value;
  clientesFiltrados = todosLosClientes.filter(function(c) {
    if (tabActual === 'activos' && c.activo === false) return false;
    if (tabActual === 'inactivos' && c.activo !== false) return false;
    if (origen && (c.origen || '') !== origen) return false;
    if (q) {
      var rs = normStr(c.razon_social);
      var cuit = (c.cuit || '').toLowerCase();
      var dni = (c.dni || '').toLowerCase();
      var cod = (c.cod_cliente || '').toLowerCase();
      if (!rs.includes(q) && !cuit.includes(q) && !dni.includes(q) && !cod.includes(q)) return false;
    }
    return true;
  });
  paginaActual = 1;
  renderTabla();
}

function renderTabla() {
  var total = clientesFiltrados.length;
  document.getElementById('contador-visible').textContent = total + ' clientes';
  if (total === 0) {
    document.getElementById('tabla-body').innerHTML = '<div class="empty-msg">No se encontraron clientes.</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  var inicio = (paginaActual - 1) * POR_PAGINA;
  var pagina = clientesFiltrados.slice(inicio, inicio + POR_PAGINA);
  var totalPags = Math.ceil(total / POR_PAGINA);

  var html = '<table><thead><tr><th>Razón Social</th><th>CUIT / DNI</th><th>Teléfono</th><th>Localidad</th><th>Equipos</th><th>Rubro</th><th>Origen</th><th></th></tr></thead><tbody>';
  pagina.forEach(function(c) {
    var identif = c.cuit || (c.dni ? 'DNI: ' + c.dni : '—');
    var origenBadge = c.origen === 'orden_instalacion'
      ? '<span class="badge-origen badge-orden">Orden</span>'
      : '<span class="badge-origen badge-importacion">Import</span>';
    html += '<tr>' +
      '<td style="font-weight:600;">' + (c.razon_social || '—') + (c.activo === false ? '<span class="badge-inactivo">INACTIVO</span>' : '') + '</td>' +
      '<td style="font-size:12px;font-family:monospace;">' + identif + '</td>' +
      '<td style="font-size:12px;color:#6b7280;">' + (c.telefono || '—') + '</td>' +
      '<td style="font-size:12px;color:#6b7280;">' + (c.localidad || '—') + '</td>' +
      '<td style="font-size:12px;color:#6b7280;">' + (c.rubro || '—') + '</td>' +
      '<td>' + origenBadge + '</td>' +
      '<td><button class="btn-ver" onclick=\'verDetalle(' + JSON.stringify(c).replace(/'/g,"&#39;") + ')\'>Ver</button></td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tabla-body').innerHTML = html;

  if (totalPags > 1) {
    document.getElementById('pagination').style.display = 'flex';
    document.getElementById('pag-info').textContent = 'Página ' + paginaActual + ' de ' + totalPags + ' (' + total + ' resultados)';
    document.getElementById('btn-prev').disabled = paginaActual === 1;
    document.getElementById('btn-next').disabled = paginaActual === totalPags;
  } else {
    document.getElementById('pagination').style.display = 'none';
  }
}

function cambiarPagina(dir) {
  paginaActual += dir;
  renderTabla();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function cambiarTab(tab) {
  tabActual = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  filtrar();
}

function verDetalle(c) {
  document.getElementById('modal-titulo').textContent = c.razon_social || 'Cliente';
  var fecha = c.created_at ? new Date(c.created_at).toLocaleDateString('es-AR') : '—';
  document.getElementById('modal-body').innerHTML =
    '<div class="detail-grid">' +
    '<div class="detail-item detail-full"><label>Razón Social</label><span>' + (c.razon_social || '—') + '</span></div>' +
    '<div class="detail-item"><label>CUIT</label><span>' + (c.cuit || '—') + '</span></div>' +
    '<div class="detail-item"><label>DNI</label><span>' + (c.dni || '—') + '</span></div>' +
    '<div class="detail-item"><label>Código Cliente</label><span>' + (c.cod_cliente || '—') + '</span></div>' +
    '<div class="detail-item"><label>Teléfono</label><span>' + (c.telefono || '—') + '</span></div>' +
    '<div class="detail-item"><label>Email</label><span>' + (c.email || '—') + '</span></div>' +
    '<div class="detail-item"><label>Rubro</label><span>' + (c.rubro || '—') + '</span></div>' +
    '<div class="detail-item detail-full"><label>Domicilio</label><span>' + (c.dom_instalacion || '—') + '</span></div>' +
    '<div class="detail-item"><label>Localidad</label><span>' + (c.localidad || '—') + '</span></div>' +
    '<div class="detail-item"><label>Método de Pago</label><span>' + (c.metodo_pago || '—') + '</span></div>' +
    '<div class="detail-item"><label>Responsable</label><span>' + (c.responsable || '—') + '</span></div>' +
    '<div class="detail-item"><label>Celular Responsable</label><span>' + (c.responsable_celular || '—') + '</span></div>' +
    '<div class="detail-item"><label>Plano</label><span>' + (c.plano || '—') + '</span></div>' +
    '<div class="detail-item"><label>Origen</label><span>' + (c.origen || '—') + '</span></div>' +
    '<div class="detail-item"><label>Estado</label><span style="font-weight:600;color:' + (c.activo === false ? '#dc2626' : '#16a34a') + ';">' + (c.activo === false ? 'Inactivo' : 'Activo') + '</span></div>' +
    '<div class="detail-item"><label>Fecha de alta</label><span>' + fecha + '</span></div>' +
    '</div>';
  // Add baja info if inactive
  if (c.activo === false) {
    var baja = (window._bajasMap || {})[c.cuit];
    if (baja) {
      var bajaHtml = '<div style="margin-top:14px;padding-top:14px;border-top:2px solid #fee2e2;">' +
        '<label style="font-size:11px;font-weight:700;color:#dc2626;text-transform:uppercase;display:block;margin-bottom:8px;">Datos de la baja</label>' +
        '<div class="detail-grid">' +
        '<div class="detail-item"><label>Motivo</label><span style="color:#dc2626;font-weight:600;">' + (baja.motivo || '\u2014') + '</span></div>' +
        '<div class="detail-item"><label>Fecha de baja</label><span>' + (baja.fecha_baja ? new Date(baja.fecha_baja + "T12:00:00").toLocaleDateString("es-AR") : '\u2014') + '</span></div>' +
        '<div class="detail-item"><label>Vendedor</label><span>' + (baja.vendedor || '\u2014') + '</span></div>' +
        '<div class="detail-item detail-full"><label>Observaciones</label><span>' + (baja.observaciones || '\u2014') + '</span></div>' +
        '</div>' +
        (baja.pdf_url ? '<a href="' + baja.pdf_url + '" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#dc2626;color:#fff;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;margin-top:8px;">\uD83D\uDCC4 PDF de Baja</a>' : '') +
        '</div>';
      document.getElementById('modal-body').innerHTML += bajaHtml;
    }
  }

  // Add equipos section
  var equipos = c.equipos_activos || [];
  var equiposHtml = '';
  if (equipos.length > 0) {
    equiposHtml = '<div style="margin-top:14px;"><label style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;display:block;margin-bottom:8px;">Equipos activos</label>' +
      '<table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr><th style="background:#f9fafb;padding:6px 10px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">Modelo</th><th style="background:#f9fafb;padding:6px 10px;text-align:center;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">Cant.</th><th style="background:#f9fafb;padding:6px 10px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">Domicilio</th><th style="background:#f9fafb;padding:6px 10px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">Localidad</th></tr></thead><tbody>' +
      equipos.map(function(e) {
        return '<tr><td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;font-weight:600;">' + (e.modelo || '') + '</td><td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;text-align:center;">' + (e.cantidad || 1) + '</td><td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;">' + (e.domicilio || '—') + '</td><td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;">' + (e.localidad || '—') + '</td></tr>';
      }).join('') + '</tbody></table></div>';
  }
  document.getElementById('modal-body').innerHTML += equiposHtml;

  // Add ordenes de instalación for this client
  var ordenesCliente = (window._ordenesList || []).filter(function(o) {
    return o.cuit && c.cuit && o.cuit.replace(/\D/g,'') === c.cuit.replace(/\D/g,'');
  });
  if (ordenesCliente.length > 0) {
    var ordHtml = '<div style="margin-top:14px;"><label style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;display:block;margin-bottom:8px;">Órdenes de instalación</label>' +
      '<table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr>' +
      '<th style="background:#f9fafb;padding:6px 10px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">N° Orden</th>' +
      '<th style="background:#f9fafb;padding:6px 10px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">Fecha</th>' +
      '<th style="background:#f9fafb;padding:6px 10px;text-align:right;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">Total</th>' +
      '<th style="background:#f9fafb;padding:6px 10px;text-align:center;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">Estado</th>' +
      '<th style="background:#f9fafb;padding:6px 10px;text-align:center;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;">PDF</th>' +
      '</tr></thead><tbody>' +
      ordenesCliente.map(function(o) {
        var fecha = o.fecha_orden ? new Date(o.fecha_orden + 'T12:00:00').toLocaleDateString('es-AR') : '';
        var estado = o.anulada ? '<span style="color:#dc2626;font-weight:600;font-size:10px;">ANULADA</span>' : '<span style="color:#16a34a;font-weight:600;font-size:10px;">Activa</span>';
        var pdf = o.pdf_url ? '<a href="' + o.pdf_url + '" target="_blank" style="color:#1565c0;font-weight:600;font-size:11px;">PDF</a>' : '';
        return '<tr><td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;font-weight:600;font-family:monospace;font-size:11px;">' + (o.numero_completo || '') + '</td>' +
          '<td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;">' + fecha + '</td>' +
          '<td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;text-align:right;color:#16a34a;font-weight:600;">$' + (parseFloat(o.total_general)||0).toLocaleString('es-AR',{minimumFractionDigits:2}) + '</td>' +
          '<td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;text-align:center;">' + estado + '</td>' +
          '<td style="padding:6px 10px;border-bottom:1px solid #f3f4f6;text-align:center;">' + pdf + '</td></tr>';
      }).join('') + '</tbody></table></div>';
    document.getElementById('modal-body').innerHTML += ordHtml;
  }

  // Add ordenes de baja for this client
  var bajasCliente = (window._bajasList || []).filter(function(b) {
    return b.cuit && c.cuit && b.cuit.replace(/\D/g,'') === c.cuit.replace(/\D/g,'');
  });
  if (bajasCliente.length > 0) {
    var bajHtml = '<div style="margin-top:14px;"><label style="font-size:11px;font-weight:700;color:#dc2626;text-transform:uppercase;display:block;margin-bottom:8px;">Órdenes de baja</label>' +
      '<table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr>' +
      '<th style="background:#fef2f2;padding:6px 10px;text-align:left;font-weight:700;color:#991b1b;border-bottom:1px solid #fecaca;">N° Baja</th>' +
      '<th style="background:#fef2f2;padding:6px 10px;text-align:left;font-weight:700;color:#991b1b;border-bottom:1px solid #fecaca;">Fecha</th>' +
      '<th style="background:#fef2f2;padding:6px 10px;text-align:left;font-weight:700;color:#991b1b;border-bottom:1px solid #fecaca;">Motivo</th>' +
      '<th style="background:#fef2f2;padding:6px 10px;text-align:center;font-weight:700;color:#991b1b;border-bottom:1px solid #fecaca;">PDF</th>' +
      '</tr></thead><tbody>' +
      bajasCliente.map(function(b) {
        var fecha = b.fecha_baja ? new Date(b.fecha_baja + 'T12:00:00').toLocaleDateString('es-AR') : '';
        var pdf = b.pdf_url ? '<a href="' + b.pdf_url + '" target="_blank" style="color:#dc2626;font-weight:600;font-size:11px;">PDF</a>' : '';
        return '<tr><td style="padding:6px 10px;border-bottom:1px solid #fef2f2;font-weight:600;font-family:monospace;font-size:11px;">' + (b.numero_completo || '') + '</td>' +
          '<td style="padding:6px 10px;border-bottom:1px solid #fef2f2;">' + fecha + '</td>' +
          '<td style="padding:6px 10px;border-bottom:1px solid #fef2f2;color:#dc2626;font-weight:600;">' + (b.motivo || '') + '</td>' +
          '<td style="padding:6px 10px;border-bottom:1px solid #fef2f2;text-align:center;">' + pdf + '</td></tr>';
      }).join('') + '</tbody></table></div>';
    document.getElementById('modal-body').innerHTML += bajHtml;
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}
</script>
</body>
</html>
