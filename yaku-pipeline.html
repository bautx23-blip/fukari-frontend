<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yakú — CRM / Pipeline</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f5f7;color:#1a1a2e;}
  .topbar{background:#1a1a2e;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-logos img{height:26px;}
  .topbar-title{font-size:14px;font-weight:600;letter-spacing:0.3px;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .btn-logout{background:transparent;border:1px solid #4b5563;color:#d1d5db;padding:6px 14px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;text-decoration:none;}
  .btn-logout:hover{border-color:#9ca3af;color:#fff;}

  .wrap{max-width:1100px;margin:20px auto;padding:0 18px;}
  .head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .h-title{font-size:16px;font-weight:800;}
  .h-sub{font-size:12px;color:#9ca3af;margin-top:2px;}
  .btn-add{background:#0ea5e9;color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

  .stages{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;}
  .stage{border:1.5px solid #e5e7eb;border-radius:12px;overflow:hidden;background:#fff;}
  .stage-head{width:100%;padding:10px 14px;background:#f8fafc;border:none;display:flex;align-items:center;gap:10px;cursor:pointer;font-family:inherit;}
  .stage-head .caret{font-size:11px;color:#4b5563;width:12px;display:inline-block;}
  .stage-head .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .stage-head .label{font-size:12px;font-weight:800;color:#1a1a2e;}
  .stage-head .count{margin-left:auto;font-size:11px;font-weight:800;color:#6b7280;background:#fff;border-radius:10px;padding:2px 8px;}
  .stage-body{border-top:1.5px solid #e5e7eb;}
  .stage-empty{padding:16px;text-align:center;color:#9ca3af;font-size:12px;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead tr{background:#f8fafc;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.3px;}
  th{text-align:left;padding:8px 14px;font-weight:700;}
  th.r{text-align:right;}
  tbody tr{border-top:1px solid #e5e7eb;}
  td{padding:10px 14px;vertical-align:top;}
  td .name{font-size:13px;font-weight:700;color:#1a1a2e;}
  td .muted{font-size:10px;color:#9ca3af;margin-top:2px;}
  td select{padding:4px 8px;border-radius:6px;border:1px solid #e5e7eb;font-size:11px;font-family:inherit;background:#fff;color:#1a1a2e;cursor:pointer;}
  td.actions{text-align:right;white-space:nowrap;}
  .del{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:#9ca3af;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .del:hover{background:#FEE2E2;color:#DC2626;}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:12px;padding:24px;width:420px;max-width:92vw;}
  .modal h3{font-size:16px;font-weight:800;margin-bottom:14px;}
  .modal label{font-size:11px;font-weight:600;color:#6b7280;display:block;margin:8px 0 3px;text-transform:uppercase;letter-spacing:0.3px;}
  .modal input,.modal select{width:100%;padding:9px 11px;border:1px solid #e5e7eb;border-radius:7px;font-size:13px;font-family:inherit;}
  .modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .btn{padding:9px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-primary{background:#0ea5e9;color:#fff;}
  .btn-ghost{background:#fff;border:1px solid #e5e7eb;color:#6b7280;}
  .loading,.err{padding:30px;text-align:center;color:#9ca3af;font-size:13px;}
  .err{color:#991B1B;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logos">
    <img src="https://yakuagua.com.ar/wp-content/uploads/2024/04/logo.png" alt="Yakú">
  </div>
  <span class="topbar-title">CRM / Pipeline</span>
  <div class="topbar-right">
    <a href="/hub.html" class="btn-logout">&#8592; Inicio</a>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<div class="wrap">
  <div class="head-row">
    <div>
      <div class="h-title">Pipeline de Ventas</div>
      <div class="h-sub" id="total">—</div>
    </div>
    <button class="btn-add" onclick="openModal()">+ Agregar lead</button>
  </div>
  <div id="stages-slot"><div class="loading">Cargando…</div></div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Nuevo lead</h3>
    <label>Nombre</label><input id="m-nombre" type="text">
    <label>Teléfono</label><input id="m-telefono" type="text">
    <label>Email</label><input id="m-email" type="email">
    <label>Localidad</label><input id="m-localidad" type="text">
    <label>Etapa</label><select id="m-etapa"></select>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="m-save" onclick="saveLead()">Agregar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var API_URL = 'https://fukari-backend-production.up.railway.app';
var SUPABASE_URL = 'https://bqjbblgbwgwqkziqzdyy.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxamJibGdid2d3cWt6aXF6ZHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg4MTAsImV4cCI6MjA4ODIwNDgxMH0.DLXFYR4EgaejMbk3wBlU9SSVCi17YJ2aPiJc2h4y5mE';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var userEmail = '';

// Etapas = tags del bot. Las terminales arrancan colapsadas (como CrmPipeline).
var STAGES = [
  { key:'en conversación', label:'En conversación', color:'#3B82F6', open:true },
  { key:'venta de equipo', label:'Pidió comprar equipo', color:'#8B5CF6', open:true },
  { key:'contactar manualmente', label:'Contactar manualmente', color:'#F59E0B', open:true },
  { key:'aguardando instalacion', label:'Aguardando instalación', color:'#16A34A', open:true },
  { key:'no calificado', label:'No calificado', color:'#9CA3AF', open:false },
  { key:'sin cobertura', label:'Sin cobertura', color:'#9CA3AF', open:false },
];
var expanded = {};
STAGES.forEach(function(s){ expanded[s.key] = s.open; });

sb.auth.getSession().then(function(result){
  var session = result.data.session;
  if (!session) { window.location.href = '/index.html'; return; }
  userEmail = session.user.email;
  document.getElementById('m-etapa').innerHTML = STAGES.map(function(s){ return '<option value="'+s.key+'">'+s.label+'</option>'; }).join('');
  load();
});
function logout(){ sb.auth.signOut().then(function(){ window.location.href = '/index.html'; }); }

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function headers(){ return { 'Content-Type':'application/json', 'x-user-email': userEmail }; }

var leads = [];

async function load(){
  try {
    var r = await fetch(API_URL + '/api/sales-bot/pipeline', { headers: { 'x-user-email': userEmail } });
    if (!r.ok) throw new Error('status ' + r.status);
    leads = await r.json();
    render();
  } catch(e){
    document.getElementById('stages-slot').innerHTML = '<div class="err">Error al cargar: ' + esc(e.message) + '</div>';
  }
}

function optsFor(etapa){
  return STAGES.map(function(s){ return '<option value="'+s.key+'"'+(s.key===etapa?' selected':'')+'>'+s.label+'</option>'; }).join('');
}

function rowHtml(l){
  return '<tr>'
    + '<td><div class="name">'+esc(l.nombre || '(sin nombre)')+'</div>'
      + (l.telefono ? '<div class="muted">'+esc(l.telefono)+'</div>' : '')
      + (l.email ? '<div class="muted">'+esc(l.email)+'</div>' : '') + '</td>'
    + '<td>'+(l.localidad ? esc(l.localidad) : '<span style="color:#cbd5e1">—</span>')+'</td>'
    + '<td><select onchange="moveLead(\''+l.id+'\', this.value)">'+optsFor(l.etapa)+'</select></td>'
    + '<td class="actions"><button class="del" title="Sacar del pipeline" onclick="delLead(\''+l.id+'\')">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>'
      + '</button></td></tr>';
}

function render(){
  document.getElementById('total').textContent = leads.length + ' lead' + (leads.length===1?'':'s') + ' en total';
  var html = '<div class="stages">';
  STAGES.forEach(function(st){
    var rows = leads.filter(function(l){ return l.etapa === st.key; });
    var open = expanded[st.key];
    html += '<div class="stage">'
      + '<button class="stage-head" onclick="toggle(\''+st.key+'\')">'
      + '<span class="caret">'+(open?'▼':'▶')+'</span>'
      + '<span class="dot" style="background:'+st.color+'"></span>'
      + '<span class="label">'+st.label+'</span>'
      + '<span class="count">'+rows.length+'</span>'
      + '</button>';
    if (open){
      if (rows.length === 0){
        html += '<div class="stage-body"><div class="stage-empty">Sin leads en esta etapa</div></div>';
      } else {
        html += '<div class="stage-body" style="overflow-x:auto"><table><thead><tr>'
          + '<th>Contacto</th><th>Localidad</th><th>Mover a</th><th class="r">&nbsp;</th>'
          + '</tr></thead><tbody>' + rows.map(rowHtml).join('') + '</tbody></table></div>';
      }
    }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('stages-slot').innerHTML = html;
}

function toggle(key){ expanded[key] = !expanded[key]; render(); }

async function moveLead(id, etapa){
  try {
    var r = await fetch(API_URL + '/api/sales-bot/pipeline/' + id, { method:'PATCH', headers: headers(), body: JSON.stringify({ etapa: etapa }) });
    if (!r.ok) throw new Error('status ' + r.status);
    var lead = leads.find(function(l){ return l.id === id; });
    if (lead) lead.etapa = etapa;
    render();
  } catch(e){ alert('No se pudo mover: ' + e.message); }
}

async function delLead(id){
  if (!confirm('¿Sacar este lead del CRM?')) return;
  try {
    var r = await fetch(API_URL + '/api/sales-bot/pipeline/' + id, { method:'DELETE', headers: { 'x-user-email': userEmail } });
    if (!r.ok) throw new Error('status ' + r.status);
    leads = leads.filter(function(l){ return l.id !== id; });
    render();
  } catch(e){ alert('No se pudo eliminar: ' + e.message); }
}

function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  ['m-nombre','m-telefono','m-email','m-localidad'].forEach(function(id){ document.getElementById(id).value=''; });
}
async function saveLead(){
  var btn = document.getElementById('m-save');
  var body = {
    nombre: document.getElementById('m-nombre').value.trim(),
    telefono: document.getElementById('m-telefono').value.trim(),
    email: document.getElementById('m-email').value.trim(),
    localidad: document.getElementById('m-localidad').value.trim(),
    etapa: document.getElementById('m-etapa').value,
  };
  if (!body.nombre && !body.telefono){ alert('Poné al menos nombre o teléfono'); return; }
  btn.disabled = true;
  try {
    var r = await fetch(API_URL + '/api/sales-bot/pipeline', { method:'POST', headers: headers(), body: JSON.stringify(body) });
    var j = await r.json();
    if (!r.ok) throw new Error(j.error || ('status ' + r.status));
    leads.unshift(j);
    if (!expanded[j.etapa]) expanded[j.etapa] = true;
    closeModal();
    render();
  } catch(e){ alert('No se pudo agregar: ' + e.message); }
  finally { btn.disabled = false; }
}
</script>
</body>
</html>
